<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ふたば(偽)お習字</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#1a1714;
    --paper:#f7f4ec;
    --paper-edge:#e6ddc8;
    --shu:#b5341f;
    --shu-deep:#8c2414;
    --wall:#6f5a44;
    --wall-dark:#5a4836;
    --ink-faint:#6b5d4a;
    --gold:#c9a227;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:"Zen Kaku Gothic New",sans-serif;
    color:var(--sumi);
    background:#e7ddc6;
  }

  .stage{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden;-webkit-user-select:none;user-select:none}
  .stage img{-webkit-user-drag:none;user-drag:none;pointer-events:none}
  input,textarea{-webkit-user-select:text;user-select:text}

  /* floating title */
  .float-header{
    position:absolute;top:10px;left:0;right:0;z-index:14;
    text-align:center;pointer-events:none;
  }
  .title{
    font-family:"Yuji Syuku",serif;
    font-size:clamp(26px,5vw,46px);
    color:var(--sumi);
    letter-spacing:.12em;
    text-shadow:1px 2px 0 rgba(255,255,255,.4);
    line-height:1.1;
  }
  .title .shu{color:var(--shu)}
  .subtitle{
    font-family:"Shippori Mincho",serif;
    color:var(--ink-faint);
    margin-top:6px;font-size:13px;letter-spacing:.16em;
    text-shadow:0 1px 0 rgba(255,255,255,.4);
  }
  .seal{
    display:inline-flex;align-items:center;justify-content:center;margin-left:8px;
    width:28px;height:28px;
    background:#2f7d3b;border-radius:4px;
    vertical-align:middle;transform:rotate(-4deg);box-shadow:0 1px 0 rgba(0,0,0,.3);
  }
  .seal svg{width:18px;height:18px;display:block}

  /* floating tools (zoom + status) top-right */
  .float-tools{
    position:absolute;top:14px;right:14px;z-index:22;
    display:flex;flex-direction:column;align-items:flex-end;gap:8px;
    background:rgba(26,23,20,.5);backdrop-filter:blur(3px);
    padding:10px 12px;border-radius:12px;
    box-shadow:0 4px 14px rgba(0,0,0,.35);
  }
  .float-tools .status{font-size:12px;color:#e9dcc0;display:flex;align-items:center;gap:8px}

  /* floating message (placing/empty/admin/err) top-center */
  .float-msg{
    position:absolute;top:74px;left:50%;transform:translateX(-50%);
    z-index:18;width:min(560px,calc(100vw - 32px));pointer-events:none;
  }
  .float-msg *{pointer-events:auto}
  .float-msg:empty{display:none}

  /* floating 半紙 panel */
  .float-desk{
    position:absolute;top:78px;left:18px;z-index:20;
    width:330px;max-width:calc(100vw - 36px);
    max-height:calc(100dvh - 96px);
    display:flex;flex-direction:column;
    background:linear-gradient(150deg,#efe6cf,#e5d7b4);
    border-radius:14px;
    box-shadow:0 14px 34px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.4);
    overflow:hidden;
    transition:opacity .4s;
  }
  .float-desk.guiding{opacity:0;pointer-events:none}
  .desk-bar{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:10px 12px 8px;flex:0 0 auto;
  }
  .desk-bar-title{
    font-family:"Shippori Mincho",serif;font-weight:700;font-size:14px;
    letter-spacing:.1em;color:var(--ink-faint);
    display:flex;align-items:center;gap:8px;
  }
  .desk-bar-title::before{content:none}
  .desk-toggle{
    width:26px;height:26px;border-radius:7px;border:none;cursor:pointer;
    background:#d8c8a2;color:var(--ink-faint);font-size:18px;font-weight:700;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0;
  }
  .desk-toggle:hover{filter:brightness(1.04)}
  .desk-body{padding:0 16px 0;overflow-x:hidden;overflow-y:auto;min-height:0;flex:1 1 auto;-webkit-overflow-scrolling:touch}
  .float-desk.collapsed .desk-body{display:none}
  .float-desk.collapsed{width:auto;max-width:none}
  .float-desk.collapsed .desk-bar{padding-bottom:10px}
  @media(max-width:560px){
    .float-desk{width:min(300px,calc(100vw - 24px));left:12px;top:70px;max-height:calc(100dvh - 80px)}
    .float-tools .zoom-ctl{display:none}
    .float-tools{padding:7px 11px}
  }
  .canvas-frame{
    background:var(--paper);
    padding:10px;
    border-radius:6px;
    box-shadow:inset 0 0 0 1px var(--paper-edge), inset 0 0 22px rgba(150,120,70,.18);
    position:relative;
    flex:0 0 auto;
  }
  /* 8 x 12 cm => 2 : 3 */
  .canvas-frame::before{
    content:"";position:absolute;inset:10px;
    border:1px dashed rgba(140,110,60,.35);
    border-radius:3px;pointer-events:none;
  }
  #pad{
    display:block;width:100%;
    aspect-ratio:2/3;
    border-radius:3px;
    touch-action:none;
    cursor:crosshair;
  }

  .tools{margin-top:10px;padding:6px 6px 0}
  /* 貼るボタンはスクロール外に常時固定（iOSでスクロールバーが出なくても見える） */
  .desk-foot{
    position:sticky;bottom:0;z-index:2;
    margin:8px -16px 0;padding:10px 16px 14px;
    background:#e7d9bb;
    border-top:1px solid rgba(140,110,60,.30);
    box-shadow:0 -10px 12px -10px rgba(60,40,10,.20);
  }
  .desk-foot .name-field{margin-bottom:8px}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .swatch{
    width:30px;height:30px;border-radius:50%;
    border:2px solid rgba(0,0,0,.15);
    cursor:pointer;position:relative;
  }
  .swatch.active{border-color:var(--sumi);box-shadow:0 0 0 2px var(--paper),0 0 0 4px var(--sumi)}
  .swatch.active::after{content:"";position:absolute;inset:0;border-radius:50%}
  .tool-label{font-size:12px;color:var(--ink-faint);font-weight:500;min-width:40px}
  .brush-seg{display:flex;gap:0;border-radius:8px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(140,110,60,.35);flex:1}
  .brush-opt{
    flex:1;border:none;cursor:pointer;background:transparent;color:var(--ink-faint);
    font-family:"Shippori Mincho",serif;font-weight:700;font-size:13px;letter-spacing:.08em;
    padding:7px 4px;
  }
  .brush-opt + .brush-opt{box-shadow:inset 1px 0 0 rgba(140,110,60,.35)}
  .brush-opt.active{background:var(--shu);color:var(--paper)}
  .brush-opt:not(.active):hover{background:rgba(181,52,31,.1)}
  input[type=range]{flex:1;accent-color:var(--sumi)}
  .size-wrap{flex:1;display:flex;flex-direction:column;gap:1px}
  .size-wrap input[type=range]{flex:none;width:100%}
  .size-dots{position:relative;height:7px}
  .size-dots i{position:absolute;top:1px;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--sumi);opacity:.75}

  .name-field{
    width:100%;
    font-family:"Zen Kaku Gothic New",sans-serif;
    font-size:14px;
    padding:9px 11px;
    border:1px solid var(--paper-edge);
    border-radius:7px;
    background:#fbf6e8;
    color:var(--sumi);
    margin-bottom:10px;
  }
  .name-field:focus{outline:none;border-color:var(--shu)}

  .btns{display:flex;gap:8px;flex-wrap:wrap}
  button{
    font-family:"Zen Kaku Gothic New",sans-serif;
    cursor:pointer;border:none;border-radius:8px;
    font-size:14px;font-weight:500;padding:11px 14px;
    transition:transform .08s, filter .15s;
  }
  button:active{transform:scale(.97)}
  .btn-ghost{
    flex:1 1 64px;min-width:0;padding:11px 8px;font-size:13px;
    background:#e2d4b2;color:var(--ink-faint);
    box-shadow:inset 0 0 0 1px rgba(140,110,60,.25);
  }
  .btn-ghost:hover{filter:brightness(1.04)}
  .btn-ghost.active{background:var(--shu);color:var(--paper);box-shadow:inset 0 0 0 1px var(--shu)}
  #photoBtn{font-size:11.5px;line-height:1.25}
  .btn-post{
    flex:1;
    background:var(--shu);color:var(--paper);
    font-family:"Shippori Mincho",serif;font-weight:700;
    letter-spacing:.25em;font-size:16px;
    box-shadow:0 3px 0 var(--shu-deep);
  }
  .btn-post:hover{filter:brightness(1.06)}
  .btn-post:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shu-deep)}
  .btn-post:disabled{opacity:.5;cursor:default;box-shadow:0 3px 0 var(--shu-deep)}

  .hint{font-size:11px;color:var(--ink-faint);opacity:.75;margin-top:9px;line-height:1.6}

  /* ---- seal (落款) on the 半紙 ---- */
  .seal-stamp{
    position:absolute;right:14px;bottom:14px;z-index:3;
    width:62px;height:62px;pointer-events:none;
    border:2.5px solid var(--shu);border-radius:4px;
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;
    color:var(--shu);font-family:"Shippori Mincho",serif;font-weight:700;
    line-height:1;opacity:.92;
  }
  .seal-stamp span{display:flex;align-items:center;justify-content:center;font-size:17px}
  .seal-stamp span.num{font-size:12px;letter-spacing:-1px}

  /* ---- wide wall / board ---- */
  .board-head{
    display:flex;align-items:center;justify-content:flex-end;
    margin:6px 0 12px;flex-wrap:wrap;gap:8px;
  }
  .board-title{
    font-family:"Shippori Mincho",serif;font-weight:700;
    color:var(--paper);font-size:18px;letter-spacing:.08em;
  }
  .board-meta{font-size:12px;color:#e9dcc0;opacity:.85;display:flex;align-items:center;gap:10px}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#7bd66a;box-shadow:0 0 0 0 rgba(123,214,106,.7);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(123,214,106,.6)}70%{box-shadow:0 0 0 8px rgba(123,214,106,0)}100%{box-shadow:0 0 0 0 rgba(123,214,106,0)}}

  #msg:not(:empty){margin-bottom:12px}
  .placing-hint{
    background:rgba(140,36,20,.94);border:1px solid var(--shu-deep);color:#fff5ef;
    padding:9px 15px;border-radius:8px;font-size:13px;font-family:"Shippori Mincho",serif;
    letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between;gap:10px;
    box-shadow:0 6px 16px rgba(0,0,0,.3);animation:pulse2 1.6s infinite;
  }
  .placing-hint .cancel{cursor:pointer;text-decoration:underline}
  @keyframes pulse2{50%{background:rgba(181,52,31,.94)}}

  .wall-scroll{
    overflow:auto;
    position:absolute;inset:0;
    height:100%;width:100%;
    border-radius:0;
    background:#e7ddc6;
    -webkit-overflow-scrolling:touch;
    cursor:grab;
    touch-action:pan-x pan-y;
    scrollbar-width:thin;
    scrollbar-color:#a7402b #d8cdb2;
  }
  .wall-scroll.grabbing{cursor:grabbing}
  .wall-scroll::-webkit-scrollbar{width:13px;height:13px}
  .wall-scroll::-webkit-scrollbar-track{background:#d8cdb2}
  .wall-scroll::-webkit-scrollbar-thumb{
    background:#a7402b;border-radius:8px;border:3px solid #d8cdb2;
  }
  .wall-scroll::-webkit-scrollbar-thumb:hover{background:var(--shu)}
  .wall-scroll::-webkit-scrollbar-corner{background:#d8cdb2}
  .wall-sizer{position:relative;}
  .wall{
    position:absolute;top:0;left:0;
    width:6000px;height:2200px;
    transform-origin:top left;
    background:
      repeating-linear-gradient(90deg, rgba(90,70,40,.045) 0 1px, transparent 1px 28px),
      linear-gradient(155deg,#f3ecdc,#e7ddc6);
  }
  .wall.placing{cursor:copy}
  .wall.placing #notes{pointer-events:none}
  .wall::after{
    content:"";position:absolute;left:0;right:0;top:50%;height:2px;
    background:repeating-linear-gradient(90deg, rgba(90,70,40,.13) 0 16px, transparent 16px 32px);
    pointer-events:none;
  }

  /* zoom control */
  .zoom-ctl{display:flex;align-items:center;gap:8px;color:#e9dcc0;font-size:12px}
  .zoom-ctl input[type=range]{width:120px;accent-color:var(--shu)}
  .zoom-ctl .zbtn{
    width:26px;height:26px;border-radius:6px;background:rgba(0,0,0,.28);color:var(--paper);
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;line-height:1;
  }
  .zoom-ctl .zbtn:hover{background:rgba(0,0,0,.45)}
  .zoom-ctl .zval{min-width:42px;text-align:right;font-weight:700}

  .note{
    position:absolute;width:104px;
    background:var(--paper);
    padding:6px 6px 7px;
    border-radius:3px;
    box-shadow:0 7px 16px rgba(0,0,0,.4);
    display:flex;flex-direction:column;
    transform-origin:50% 50%;
    animation:drop .45s cubic-bezier(.2,.9,.3,1.2) both;
  }
  .note.no-anim{animation:none}
  .note.mine{outline:2px solid var(--gold);outline-offset:2px;z-index:20}
  .note.is-hidden{opacity:.55;outline:2px dashed var(--shu);outline-offset:2px}
  .note img{display:block;width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:2px;background:#fff}
  .note .imgwrap{position:relative}
  /* 読み込み前の空半紙（うっすら和紙色）。読めたらふわっと表示 */
  .note .note-img{
    width:100%;aspect-ratio:2/3;border-radius:2px;
    background:repeating-linear-gradient(0deg,#fbf8f0,#fbf8f0 7px,#f4eede 7px,#f4eede 8px);
    opacity:0;transition:opacity .3s;
  }
  .note .note-img.ready{opacity:1;background:#fff}
  .note .tape{
    position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(var(--r,-3deg));
    width:48px;height:18px;
    background:rgba(216,201,168,.62);
    box-shadow:0 1px 3px rgba(0,0,0,.2);z-index:2;
  }
  /* 反転（180°）した半紙はテープを反対の端へ＝画面上では上側に来る */
  .note.flipped .tape{top:auto;bottom:-9px}
  .note .who{
    font-size:10px;color:var(--ink-faint);
    text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    font-family:"Shippori Mincho",serif;margin:4px 2px 4px;
  }
  .note .acts{display:flex;align-items:center;gap:3px;margin-top:auto}
  .sou-btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:2px;
    background:#efe3c4;color:var(--ink-faint);
    border-radius:5px;padding:4px 3px;font-size:10px;font-weight:700;
    box-shadow:inset 0 0 0 1px rgba(140,110,60,.2);
  }
  .sou-btn .n{color:var(--shu-deep)}
  .sou-btn.done{background:#f3d9c9;color:var(--shu-deep);box-shadow:inset 0 0 0 1px var(--shu)}
  .sou-btn:hover{filter:brightness(1.04)}
  .del-btn{
    background:transparent;color:#a98e6b;font-size:10px;font-weight:500;
    padding:4px 6px;border-radius:5px;letter-spacing:.05em;
  }
  .del-btn:hover{background:rgba(181,52,31,.12);color:var(--shu-deep)}
  .del-btn.done{color:#c9b48f;cursor:default}
  /* 選択中（最前面）の半紙だけボタンが効く。非選択はボタンを淡色＝押せない見た目に */
  .note .acts button{opacity:.45;transition:opacity .15s}
  .note.sel .acts button, .note.mine .acts button{opacity:1}
  .note.sel{outline:2px solid rgba(181,52,31,.55);outline-offset:2px;border-radius:3px}
  .admin-line{
    display:flex;align-items:center;gap:4px;margin-top:6px;flex-wrap:wrap;
    font-size:9px;color:var(--ink-faint);
    border-top:1px dashed rgba(140,110,60,.3);padding-top:5px;
  }
  .admin-line .stat{background:#e8dcbb;border-radius:4px;padding:2px 5px}
  .admin-line .stat.warn{background:#f0cdbf;color:var(--shu-deep)}
  .mini{font-size:9px;padding:3px 7px;border-radius:5px;font-weight:700}
  .mini.restore{background:#d8e8cf;color:#2f5a23}
  .mini.del{background:#f0cdbf;color:var(--shu-deep)}
  .hidden-badge{
    position:absolute;top:6px;left:6px;z-index:2;
    background:var(--shu);color:var(--paper);font-size:9px;font-weight:700;
    padding:2px 5px;border-radius:3px;font-family:"Shippori Mincho",serif;
  }

  /* ghost preview while placing */
  .ghost{
    position:absolute;width:104px;pointer-events:none;display:none;z-index:30;
    opacity:.8;transform-origin:50% 0;filter:drop-shadow(0 8px 10px rgba(0,0,0,.4));
  }
  .ghost.show{display:block}
  .ghost img{display:block;width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:2px;background:var(--paper);padding:5px}

  /* angle adjust bar (floating bottom-center) */
  .anglebar{
    position:absolute;left:50%;bottom:84px;transform:translateX(-50%);z-index:26;
    display:none;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;
    width:min(440px,calc(100vw - 32px));
    padding:10px 16px;border-radius:12px;
    background:linear-gradient(150deg,#efe6cf,#e5d7b4);
    box-shadow:0 10px 24px rgba(0,0,0,.45);
  }
  .anglebar.show{display:flex}
  /* PC: 半紙中央を軸にした弧型の回転スライダー */
  .rotor{position:fixed;z-index:55;display:none;touch-action:none;cursor:grab}
  .rotor.show{display:block}
  .rotor:active{cursor:grabbing}
  .rotor svg{display:block;overflow:visible;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
  .rotor #rotorHandle{cursor:grab}
  .rotor-flip{
    position:absolute;left:50%;top:0;transform:translateX(-50%);
    font-size:15px;line-height:1;padding:5px 12px;border-radius:999px;
    background:#e7d9bb;color:var(--shu-deep);
    box-shadow:0 2px 6px rgba(0,0,0,.3), inset 0 0 0 1px rgba(140,110,60,.4);
    cursor:pointer;user-select:none;
  }
  .rotor-flip.active{background:var(--shu);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3)}
  /* 初回ガイド：中央で点滅→左上のバー位置へ移動 */
  .guide{
    position:fixed;z-index:80;
    display:flex;align-items:center;gap:10px;
    padding:13px 20px;border-radius:13px;
    background:linear-gradient(150deg,#efe6cf,#e5d7b4);
    color:var(--ink-faint);
    font-family:"Shippori Mincho",serif;font-weight:700;font-size:16px;white-space:nowrap;
    box-shadow:0 12px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.4);
    opacity:0;pointer-events:none;cursor:pointer;
    transition:left .8s cubic-bezier(.85,0,.12,1), top .8s cubic-bezier(.85,0,.12,1), transform .8s cubic-bezier(.85,0,.12,1), opacity .4s;
  }
  .guide .g-plus{
    width:24px;height:24px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--shu);color:#fff;font-size:17px;line-height:1;
  }
  .guide.show{opacity:1;pointer-events:auto;animation:guidePulse 1s ease-in-out infinite}
  @keyframes guidePulse{
    0%,100%{box-shadow:0 12px 32px rgba(0,0,0,.45), 0 0 0 0 rgba(181,52,31,0)}
    50%{box-shadow:0 12px 32px rgba(0,0,0,.45), 0 0 0 7px rgba(181,52,31,.30)}
  }
  .anglebar .lab{font-family:"Shippori Mincho",serif;font-weight:700;font-size:13px;color:var(--ink-faint)}
  .anglebar input[type=range]{flex:1;min-width:140px;accent-color:var(--shu)}
  .anglebar .val{font-size:13px;font-weight:700;color:var(--shu-deep);min-width:42px;text-align:right}
  .anglebar .ok{
    background:var(--shu);color:var(--paper);font-family:"Shippori Mincho",serif;
    font-weight:700;letter-spacing:.15em;padding:9px 18px;border-radius:8px;box-shadow:0 3px 0 var(--shu-deep);
  }
  .anglebar .ok:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shu-deep)}

  /* nav cluster: 半紙めぐり + ミニマップ */
  .nav-cluster{
    position:fixed;right:14px;bottom:14px;z-index:24;
    display:flex;flex-direction:column;align-items:flex-end;gap:8px;
  }
  .meguri{
    display:flex;align-items:center;gap:6px;
    background:rgba(26,23,20,.55);backdrop-filter:blur(3px);
    padding:6px 8px;border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.3);
  }
  .meguri button{
    width:36px;height:32px;border-radius:7px;border:none;cursor:pointer;
    background:#e3d7b8;color:var(--ink-faint);font-size:15px;font-weight:700;line-height:1;

  appId: "1:37028778656:web:585e364ce0a83f25646fc5"

/* ↑↑↑ databaseURL が空だと共有ボードは動きません ↑↑↑ */

const DEL_THRESHOLD = 5;          // del がこの数たまると自動で非表示
const ADMIN_PASS = "futaba";      // ★運営パスワード（必ず変更してください）

  getDatabase, ref, push, set, update, remove, get,
  onChildAdded, onChildChanged, onChildRemoved, runTransaction

/* ---------- canvas drawing ---------- */
const pad = document.getElementById("pad");
const ctx = pad.getContext("2d");
const DPR = Math.min(window.devicePixelRatio || 1, 2);
const PAPER = "#f7f4ec";
let color = "#1a1714";
let size = 14;
let erasing = false;
let brushType = "taper";              // "taper"=先細, "flat"=平筆
const NIB = -35 * Math.PI/180;        // 平筆のニブ角度
let drawing = false;
let last = null;
let lastTime = 0;
let lastWidth = 0;
let lastDir = null;   // 直近の運筆方向（抜きの三角テールに使う）
let penOff = false;   // 描画中にカーソルが描画エリア外に出ているか
let strokeLen = 0;    // ストローク開始からの累積距離（入りの筆圧ランプ用）
let fillMode = false; // 塗りつぶし（バケツ）モード
let undoStack = [];

function setupCanvas(){
  const rect = pad.getBoundingClientRect();
  const w = Math.round(rect.width * DPR);
  const h = Math.round(rect.width * 1.5 * DPR);
  // preserve current drawing on resize
  let prev = null;
  if (pad.width) { prev = document.createElement("canvas"); prev.width = pad.width; prev.height = pad.height; prev.getContext("2d").drawImage(pad,0,0); }
  pad.width = w; pad.height = h;
  ctx.fillStyle = PAPER; ctx.fillRect(0,0,w,h);
  if (prev) ctx.drawImage(prev,0,0,w,h);
  ctx.lineCap = "round"; ctx.lineJoin = "round";
}
window.addEventListener("resize", ()=>{ const d=pad.toDataURL(); const img=new Image(); img.onload=()=>{ setupCanvas(); ctx.drawImage(img,0,0,pad.width,pad.height); }; img.src=d; });

function pos(e){
  const r = pad.getBoundingClientRect();
  const cx = (e.touches? e.touches[0].clientX : e.clientX) - r.left;
  const cy = (e.touches? e.touches[0].clientY : e.clientY) - r.top;
  return { x: cx * (pad.width / r.width), y: cy * (pad.height / r.height) };
}
function pushUndo(){
  try{ undoStack.push(ctx.getImageData(0,0,pad.width,pad.height)); if(undoStack.length>12) undoStack.shift(); }catch(e){}
}
function start(e){
  e.preventDefault();
  if(fillMode){ pushUndo(); const fp = pos(e); floodFill(fp.x, fp.y); return; } // バケツ：タップ位置を塗る
  pushUndo();
  drawing = true; last = pos(e); lastTime = performance.now(); lastDir = null; penOff = false; strokeLen = 0;
  if(!erasing && brushType==="flat"){ flatDab(last); return; }
  if(!erasing && brushType==="round"){ dot(last, size*DPR); return; } // 丸筆：一定の太さ
  lastWidth = erasing ? size*2*DPR : Math.max(1, size*0.12)*DPR; // 入り：ごく細い種点から
  dot(last, lastWidth);
}
function flatNib(){ const h=size/2*DPR; return { nx:Math.cos(NIB)*h, ny:Math.sin(NIB)*h }; }
function flatDab(p){
  const {nx,ny}=flatNib();
  ctx.strokeStyle=color; ctx.lineWidth=Math.max(2, size*0.18*DPR); ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(p.x+nx,p.y+ny); ctx.lineTo(p.x-nx,p.y-ny); ctx.stroke();
}
// a→b をニブ（固定角の平筆）で連続的に塗る。点が飛んでもドットにならないよう細かく補間
function flatStroke(a,b){
  const {nx,ny}=flatNib();
  const lw = Math.max(2, size*0.18*DPR);
  const d = Math.hypot(b.x-a.x, b.y-a.y);
  const n = Math.max(1, Math.ceil(d/(lw*0.5)));   // ニブ太さより細かい間隔で重ねる
  ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.lineCap="round";
  for(let i=0;i<=n;i++){
    const t=i/n, x=a.x+(b.x-a.x)*t, y=a.y+(b.y-a.y)*t;
    ctx.beginPath(); ctx.moveTo(x+nx,y+ny); ctx.lineTo(x-nx,y-ny); ctx.stroke();
  }
}
function resumeAt(p){            // エリアに戻った：同じ太さのまま継ぎ目なく再開（線でつながない）
  penOff = false;
  last = p; lastTime = performance.now(); lastDir = null;
}
function move(e){
  if(!drawing) return; e.preventDefault();
  const p = pos(e);
  const inside = p.x>=0 && p.x<=pad.width && p.y>=0 && p.y<=pad.height;
  if(!inside){ penOff = true; return; }     // 外：描かない・ストロークも終わらせない
  if(penOff || !last){ resumeAt(p); return; } // 戻ってきた→同じストロークとして再開

  if(!erasing && brushType==="flat"){ flatStroke(last, p); last = p; return; }
  if(!erasing && brushType==="round"){          // 丸筆：太さ一定・丸い筆
    ctx.strokeStyle=color; ctx.lineWidth=size*DPR; ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.beginPath(); ctx.moveTo(last.x,last.y);
    const mx=(last.x+p.x)/2, my=(last.y+p.y)/2;
    ctx.quadraticCurveTo(last.x,last.y,mx,my); ctx.stroke();
    last = p; return;
  }

  const now = performance.now();
  const dx = p.x-last.x, dy = p.y-last.y;
  const dist = Math.hypot(dx,dy);

  let targetW;
  if(erasing){
    targetW = size*2*DPR;
  } else {
    // 先細：入りは細い点から、開始距離に応じて本体の太さまで立ち上げる（速度には依存しない）
    const base = size*DPR;
    strokeLen += dist;
    const head = Math.min(1, strokeLen/(base*2.0));   // base*2pxかけて 0.08→1.0
    targetW = base * (0.08 + 0.92*head);
  }
  // なめらかに太さを変化させる
  const w = erasing ? targetW : lastWidth + (targetW-lastWidth)*0.5;

  ctx.strokeStyle = erasing ? PAPER : color;
  ctx.lineWidth = w;
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(last.x,last.y);
  const mx=(last.x+p.x)/2, my=(last.y+p.y)/2;
  ctx.quadraticCurveTo(last.x,last.y,mx,my);
  ctx.stroke();

  if(dist>0.5){ lastDir = { x:dx/dist, y:dy/dist }; }
  last = p; lastTime = now; lastWidth = w;
}
// 抜き：運筆方向へ延長して0へ細める（先端を点にする）
function taperTail(){
  if(!last || !lastDir || lastWidth<=0.6) return;
  const steps = 6;
  const len = Math.min(lastWidth*1.6, size*DPR*1.4);
  let x = last.x, y = last.y, w0 = lastWidth;
  ctx.strokeStyle = color; ctx.lineCap = "round"; ctx.lineJoin = "round";
  for(let i=1;i<=steps;i++){
    const nx = last.x + lastDir.x*(len*i/steps);
    const ny = last.y + lastDir.y*(len*i/steps);
    const w1 = lastWidth*(1 - i/steps);   // 先端まで0へ
    ctx.lineWidth = Math.max(0.3, (w0+w1)/2);
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(nx,ny); ctx.stroke();
    x = nx; y = ny; w0 = w1;
  }
}
function dot(p,w){
  ctx.fillStyle = erasing ? PAPER : color;
  ctx.beginPath();
  ctx.arc(p.x,p.y,(w||(erasing?size*2:size)*DPR)/2,0,Math.PI*2);
  ctx.fill();
}
function end(){
  if(drawing && !erasing && brushType==="taper") taperTail();
  drawing=false; last=null; lastDir=null;
}
function hexToRgb(hex){
  hex = String(hex).replace("#","");
  if(hex.length===3) hex = hex.split("").map(c=>c+c).join("");
  const n = parseInt(hex,16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
// バケツ塗りつぶし（クリック地点と地続きの同系色領域を現在色で塗る）
function floodFill(sx, sy){
  const W = pad.width, H = pad.height;
  sx = Math.max(0, Math.min(W-1, Math.round(sx)));
  sy = Math.max(0, Math.min(H-1, Math.round(sy)));
  let img;
  try{ img = ctx.getImageData(0,0,W,H); }catch(e){ return; }
  const data = img.data;
  const i0 = (sy*W+sx)*4;
  const tr=data[i0], tg=data[i0+1], tb=data[i0+2], ta=data[i0+3];
  const [fr,fg,fb] = hexToRgb(erasing ? PAPER : color);
  if(Math.abs(tr-fr)<3 && Math.abs(tg-fg)<3 && Math.abs(tb-fb)<3 && ta===255) return; // 既に同色
  const tol = 48;
  const match = (i)=> Math.abs(data[i]-tr)<=tol && Math.abs(data[i+1]-tg)<=tol &&
                      Math.abs(data[i+2]-tb)<=tol && Math.abs(data[i+3]-ta)<=tol;
  const seen = new Uint8Array(W*H);
  const stack = [[sx,sy]];
  while(stack.length){
    const [px,py] = stack.pop();
    let x = px;
    while(x>=0 && !seen[py*W+x] && match((py*W+x)*4)) x--;
    x++;
    let up=false, down=false;
    while(x<W && !seen[py*W+x] && match((py*W+x)*4)){
      const p=(py*W+x)*4;
      data[p]=fr; data[p+1]=fg; data[p+2]=fb; data[p+3]=255;
      seen[py*W+x]=1;
      if(py>0){ const a=((py-1)*W+x); if(!seen[a] && match(a*4)){ if(!up){ stack.push([x,py-1]); up=true; } } else up=false; }
      if(py<H-1){ const b=((py+1)*W+x); if(!seen[b] && match(b*4)){ if(!down){ stack.push([x,py+1]); down=true; } } else down=false; }
      x++;
    }
  }
  // 1px 外側に拡張して塗る（境界のにじみ・隙間を埋める）
  const add = [];
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const id=y*W+x;
      if(seen[id]) continue;
      let near=false;
      for(let dy=-1;dy<=1 && !near;dy++){
        for(let dx=-1;dx<=1;dx++){
          if(!dy && !dx) continue;
          const ny=y+dy, nx=x+dx;
          if(ny>=0&&ny<H&&nx>=0&&nx<W && seen[ny*W+nx]){ near=true; break; }
        }
      }
      if(near) add.push(id);
    }
  }
  for(const id of add){ const p=id*4; data[p]=fr; data[p+1]=fg; data[p+2]=fb; data[p+3]=255; }
  ctx.putImageData(img,0,0);
}

pad.addEventListener("mousedown",start);
window.addEventListener("mousemove",move);
window.addEventListener("mouseup",end);
pad.addEventListener("touchstart",start,{passive:false});
window.addEventListener("touchmove",move,{passive:false});
window.addEventListener("touchend",end);
window.addEventListener("touchcancel",end);

/* color picker */
document.getElementById("colors").addEventListener("click",e=>{
  const sw = e.target.closest(".swatch"); if(!sw) return;
  document.querySelectorAll(".swatch").forEach(s=>s.classList.remove("active"));
  sw.classList.add("active");
  const c = sw.dataset.color;
  if(c==="ERASER"){ erasing=true; } else { erasing=false; color=c; }
});
// スライダー位置(0〜100)→筆の太さ。下5割はなめらか、上5割は極太の4段にカチッと吸い付く
const SIZE_DETENTS = [62.5, 75, 87.5, 100];        // 上半分の段（最後は端）
function nearestDetentIdx(pos){
  let idx=0, best=1e9;
  for(let i=0;i<SIZE_DETENTS.length;i++){ const d=Math.abs(pos-SIZE_DETENTS[i]); if(d<best){best=d;idx=i;} }
  return idx;
}
function sizeFromPos(pos){
  if(pos <= 50) return Math.round(4 + (pos/50)*(44-4));      // 4〜44 なめらか
  const cw = (pad.getBoundingClientRect().width) || 248;     // 描画エリア幅(CSS px)
  const big = [0.22,0.28,0.34,0.40].map(r=> Math.round(cw*r)); // 22/28/34/40%
  return big[nearestDetentIdx(pos)];
}

function loadImgEl(file){
  return new Promise((res,rej)=>{
    const img = new Image(); const url = URL.createObjectURL(file);
    img.onload = ()=>{ URL.revokeObjectURL(url); res(img); };
    img.onerror = (e)=>{ URL.revokeObjectURL(url); rej(e); };
    img.src = url;
  });
}
function drawPhotoCover(img){
  const cw = pad.width, ch = pad.height;            // 半紙キャンバス（2:3）
  const iw = img.width, ih = img.height;
  const cr = cw/ch, ir = iw/ih;
  let sx, sy, sw, sh;
  if(ir > cr){ sh = ih; sw = ih*cr; sx = (iw-sw)/2; sy = 0; }   // 横長→左右を切る
  else       { sw = iw; sh = iw/cr; sx = 0; sy = (ih-sh)/2; }   // 縦長→上下を切る
  ctx.fillStyle = PAPER; ctx.fillRect(0,0,cw,ch);
  ctx.drawImage(img, sx,sy,sw,sh, 0,0, cw,ch);                   // はみ出しを切って全面に
}
photoInput.addEventListener("change", async (e)=>{

    try{ img = await createImageBitmap(file, {imageOrientation:"from-image"}); }  // EXIF回転を反映

  }
});

/* ---------- export (downscaled) ---------- */
function drawSeal(o, cx, cy, side){
  // 朱の角印風（右下）。グリッド 2列×3行：園双 / 祭葉 / 21学
  o.save();
  o.strokeStyle = "#b5341f";
  o.lineWidth = Math.max(2, side*0.05);
  const r = side*0.07;
  o.beginPath();
  o.moveTo(cx+r,cy); o.arcTo(cx+side,cy,cx+side,cy+side,r);
  o.arcTo(cx+side,cy+side,cx,cy+side,r); o.arcTo(cx,cy+side,cx,cy,r);
  o.arcTo(cx,cy,cx+side,cy,r); o.closePath(); o.stroke();
  o.fillStyle = "#b5341f";
  o.textAlign = "center"; o.textBaseline = "middle";
  const colL = cx + side*0.29, colR = cx + side*0.71;
  const rows = [cy+side*0.215, cy+side*0.5, cy+side*0.785];
  const big = `700 ${Math.round(side*0.27)}px "Shippori Mincho", serif`;
  o.font = big;
  o.fillText("園", colL, rows[0]); o.fillText("双", colR, rows[0]);
  o.fillText("祭", colL, rows[1]); o.fillText("葉", colR, rows[1]);
  o.fillText("学", colR, rows[2]);
  // 「21」は2文字で1文字ぶん扱い：高さは他の字と同じ、横だけ枠に収まるよう詰める
  const w21 = o.measureText("21").width;
  const target = side*0.40;
  const sx21 = w21 > target ? target/w21 : 1;
  o.save();
  o.translate(colL, rows[2]);
  o.scale(sx21, 1);
  o.fillText("21", 0, 0);
  o.restore();
  o.restore();
}
function exportImage(){
  const out = document.createElement("canvas");
  out.width = 220; out.height = 330;
  const o = out.getContext("2d");
  o.fillStyle = PAPER; o.fillRect(0,0,220,330);
  o.drawImage(pad,0,0,220,330);
  const side = 62, margin = 14;
  drawSeal(o, 220-margin-side, 330-margin-side, side);
  return out.toDataURL("image/jpeg", 0.72);   // PNG→JPEGで容量を大幅削減（特に写真）
}
function isBlank(){
  // sample a downscale and check variance vs paper
  const t=document.createElement("canvas"); t.width=40;t.height=60;
  const tc=t.getContext("2d"); tc.drawImage(pad,0,0,40,60);
  const d=tc.getImageData(0,0,40,60).data;
  for(let i=0;i<d.length;i+=4){ if(Math.abs(d[i]-244)>22||Math.abs(d[i+1]-236)>22||Math.abs(d[i+2]-216)>22) return false; }
  return true;
}

/* ---------- 画像キャッシュ（メモリ + IndexedDB） ---------- */
const imgCache = new Map();   // id -> dataURL（このセッション）
const imgState = new Map();   // id -> "loading" | "loaded" | "error"
let idbPromise = null;
function openIDB(){
  if(idbPromise) return idbPromise;
  idbPromise = new Promise((res)=>{
    try{
      const req = indexedDB.open("futaba-oshuji", 1);
      req.onupgradeneeded = ()=>{ const d=req.result; if(!d.objectStoreNames.contains("imgs")) d.createObjectStore("imgs"); };
      req.onsuccess = ()=> res(req.result);
      req.onerror  = ()=> res(null);
    }catch(_){ res(null); }
  });
  return idbPromise;
}
async function idbGet(id){
  const db = await openIDB(); if(!db) return null;
  return new Promise(res=>{
    try{ const tx=db.transaction("imgs","readonly").objectStore("imgs").get(id);
      tx.onsuccess=()=>res(tx.result||null); tx.onerror=()=>res(null);
    }catch(_){ res(null); }
  });
}
async function idbPut(id, data){
  const db = await openIDB(); if(!db) return;
  try{ db.transaction("imgs","readwrite").objectStore("imgs").put(data, id); }catch(_){}
}
async function idbDel(id){
  const db = await openIDB(); if(!db) return;
  try{ db.transaction("imgs","readwrite").objectStore("imgs").delete(id); }catch(_){}
}
function seedImage(id, data){   // 自分の投稿などをキャッシュに先置き
  imgCache.set(id, data); imgState.set(id, "loaded"); idbPut(id, data);
}
function setNoteImg(id){
  const data = imgCache.get(id); if(!data) return;
  const el = notesEl.querySelector('.note[data-id="'+id+'"] .note-img');
  if(el){ el.src = data; el.classList.add("ready"); }
}
async function loadImage(id){
  if(imgState.get(id)==="loaded" || imgState.get(id)==="loading") return;
  const p = posts.get(id);
  if(p && p.img){ seedImage(id, p.img); setNoteImg(id); return; } // 旧形式（埋め込み）に対応
  imgState.set(id, "loading");
  // 1) IndexedDB
  const local = await idbGet(id);
  if(local){ imgCache.set(id, local); imgState.set(id,"loaded"); setNoteImg(id); return; }
  // 2) サーバから1枚だけ取得
  try{
    const snap = await get(ref(db, "imgs/"+id));
    const data = snap && snap.val();
    if(data){ imgCache.set(id, data); imgState.set(id,"loaded"); idbPut(id, data); setNoteImg(id); }
    else { imgState.set(id, "error"); }
  }catch(e){ imgState.set(id, "error"); }
}
// 表示範囲（＋余白）にある半紙の画像だけ読み込む
let lazyScheduled = false;
function scheduleLazy(){ if(lazyScheduled) return; lazyScheduled=true; requestAnimationFrame(()=>{ lazyScheduled=false; ensureImagesInView(); }); }
function ensureImagesInView(){
  if(!notesEl) return;
  const marginX = scrollEl.clientWidth*0.6, marginY = scrollEl.clientHeight*0.6;
  const x0 = scrollEl.scrollLeft/zoom - marginX/zoom;
  const x1 = (scrollEl.scrollLeft+scrollEl.clientWidth)/zoom + marginX/zoom;
  const y0 = scrollEl.scrollTop/zoom - marginY/zoom;
  const y1 = (scrollEl.scrollTop+scrollEl.clientHeight)/zoom + marginY/zoom;
  posts.forEach((p,id)=>{
    if(p.hidden && !admin) return;
    if(imgState.get(id)==="loaded" || imgState.get(id)==="loading") return;
    const cx = nxOf(p,id)*(WALL_W-NOTE_W) + NOTE_W/2;
    const cy = nyOf(p,id)*(WALL_H-NOTE_H) + NOTE_H/2;
    if(cx>=x0 && cx<=x1 && cy>=y0 && cy<=y1) loadImage(id);
  });
}

function tapeColor(){ const a=[ -5,-3,3,5,-2,2 ]; return a[Math.floor(Math.random()*a.length)]; }
function esc(s){ return (s||"").replace(/[<>&"]/g, c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }
function rndAngle(){ return Math.round(Math.random()*5) * (Math.random()<0.5?-1:1); } // 初期は垂直から±5°
function hashFrac(str, salt){ let h=2166136261; const s=(str||"")+salt; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return ((h>>>0)%10000)/10000; }
function nxOf(p,id){ return (typeof p.nx==="number") ? p.nx : hashFrac(id,"x"); }
function nyOf(p,id){ return (typeof p.ny==="number") ? p.ny : hashFrac(id,"y"); }
function angOf(p,id){ return (typeof p.angle==="number") ? p.angle : Math.round(hashFrac(id,"a")*44-22); }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

function setMsg(html){ msgEl.innerHTML = html || ""; }

function render(){
  const list = [...posts.entries()].map(([id,p])=>({id,...p}));
  const visible = admin ? list : list.filter(p=> !p.hidden);
  visible.sort((a,b)=> (a.t||0)-(b.t||0)); // 古い順に重ねる（新しいものが上）
  countEl.textContent = visible.length ? visible.length + " 枚" : "まだ0枚";

  // メッセージ帯（運営/空）。placing中の案内は別途出すので上書きしない
  if(!placing){
    if(admin){
      setMsg('<div class="admin-banner"><span>運営モード：非表示の投稿も表示中。削除は元に戻せません。</span><span class="cancel" style="cursor:pointer;text-decoration:underline" onclick="exitAdmin()">終了</span></div>');
    } else if(!visible.length){
      setMsg('<div class="empty"><span class="big">習</span>まだ誰も貼っていません。<br>左で書いて「貼る」を押そう。</div>');
    } else {
      setMsg("");
    }
  }

  notesEl.innerHTML = visible.map(p=>{
    const left = clamp(nxOf(p,p.id),0,1) * (WALL_W-NOTE_W);
    const top  = clamp(nyOf(p,p.id),0,1) * (WALL_H-NOTE_H);
    const ang  = angOf(p,p.id);
    const aNorm = ((ang%360)+360)%360;
    const flippedCls = (aNorm>90 && aNorm<270) ? " flipped" : "";   // 上下反転している半紙
    const cached = imgCache.get(p.id) || p.img || "";
    const imgHtml = `<img class="note-img${cached?' ready':''}" alt=""${cached?` src="${cached}"`:''}>`;
    const souCls = souDone.has(p.id) ? "sou-btn done" : "sou-btn";
    const delCls = delDone.has(p.id) ? "del-btn done" : "del-btn";
    const hiddenBadge = p.hidden ? '<span class="hidden-badge">非表示</span>' : '';
    const mine = (p.id===editingId) ? " mine" : "";
    const fresh = !renderedIds.has(p.id) ? "" : " no-anim";  // 既存はアニメ無し（ビクつき防止）
    const adminLine = admin ? `
      <div class="admin-line">
        <span class="stat">そうだね ${p.sou||0}</span>
        <span class="stat ${ (p.del||0)>=DEL_THRESHOLD ? 'warn':'' }">del ${p.del||0}</span>
        <span style="flex:1"></span>
        ${ p.hidden ? `<button class="mini restore" onclick="adminRestore('${p.id}')">復活</button>` : '' }
        <button class="mini del" onclick="adminDelete('${p.id}')">削除</button>
      </div>` : '';
    const zr = zOverride.has(p.id) ? `;z-index:${zOverride.get(p.id)}` : "";
    return `
    <div class="note${mine}${fresh}${flippedCls} ${p.hidden?'is-hidden':''}" data-id="${p.id}" style="left:${left}px;top:${top}px;transform:rotate(${ang}deg)${zr}">
      <span class="tape" style="--r:${tapeColor()}deg"></span>
      <div class="imgwrap">${hiddenBadge}${imgHtml}</div>
      <div class="who">${esc(p.name)||"としあき"}</div>
      <div class="acts">
        <button class="${souCls}" onclick="vote('sou','${p.id}')">そうだね<span class="n"> ${p.sou||0}</span></button>
        <button class="${delCls}" onclick="vote('del','${p.id}')">del</button>
      </div>
      ${adminLine}
    </div>`;
  }).join("");

  if(activeNoteId){
    const ae = notesEl.querySelector('.note[data-id="'+activeNoteId+'"]');
    if(ae) ae.classList.add("sel");
  }

  renderedIds.clear();
  visible.forEach(p=> renderedIds.add(p.id));

  if(typeof drawMinimap === "function") drawMinimap();
  scheduleLazy();   // 表示範囲の画像を読み込む
}

function listen(){
  if(!db){ showConnError(); return; }
  const postsRef = ref(db, "posts");
  try{
    onChildAdded(postsRef, snap=>{
      posts.set(snap.key, snap.val()||{});
      render();
      if(!didInitialFocus){ clearTimeout(focusTimer); focusTimer = setTimeout(initialFocus, 500); }
    });

function wallCoords(clientX, clientY){
  const r = wallEl.getBoundingClientRect(); // r is the scaled, scrolled rect
  const x = clamp((clientX - r.left)/zoom - NOTE_W/2, 0, WALL_W-NOTE_W);
  const y = clamp((clientY - r.top)/zoom - 10,        0, WALL_H-NOTE_H);
  return {x, y};
}
/* 重なり制御：下の半紙の画像部分が最低2割は露出する位置へずらす（ズレはランダム） */
function noteImgRect(x,y){ const m=6, w=NOTE_W-2*m; return {x:x+m, y:y+m, w, h:w*1.5}; }
function rectInter(a,b){
  const ix = Math.max(0, Math.min(a.x+a.w,b.x+b.w) - Math.max(a.x,b.x));
  const iy = Math.max(0, Math.min(a.y+a.h,b.y+b.h) - Math.max(a.y,b.y));
  return ix*iy;
}
function worstCover(x,y){
  const nr = {x, y, w:NOTE_W, h:NOTE_H};   // 新しい半紙が覆う全体の矩形
  let worst = 0;
  posts.forEach((p,id)=>{
    if(p.hidden && !admin) return;
    const ex = clamp(nxOf(p,id),0,1)*(WALL_W-NOTE_W);
    const ey = clamp(nyOf(p,id),0,1)*(WALL_H-NOTE_H);
    const ir = noteImgRect(ex,ey);
    const cov = rectInter(nr, ir)/(ir.w*ir.h);   // 下の画像がどれだけ隠れるか
    if(cov>worst) worst = cov;
  });
  return worst;
}
function adjustPlacement(x,y){
  if(worstCover(x,y) <= 0.8) return {x,y};       // 2割以上見えていればOK
  let best={x,y}, bestCov=worstCover(x,y);
  for(const r of [28,44,64,90,120,150,190]){
    for(let k=0;k<12;k++){
      const a = Math.random()*Math.PI*2;
      const cx = clamp(x+Math.cos(a)*r, 0, WALL_W-NOTE_W);
      const cy = clamp(y+Math.sin(a)*r, 0, WALL_H-NOTE_H);
      const c = worstCover(cx,cy);
      if(c<=0.8) return {x:cx, y:cy};
      if(c<bestCov){ bestCov=c; best={x:cx,y:cy}; }
    }
  }
  return best;   // 完全には避けられないときは一番マシな位置
}
wallEl.addEventListener("pointermove", e=>{
  if(!placing) return;
  const {x,y} = wallCoords(e.clientX, e.clientY);
  ghostEl.style.left = x+"px"; ghostEl.style.top = y+"px";
});
wallEl.addEventListener("click", async e=>{
  if(!placing) return;
  let {x,y} = wallCoords(e.clientX, e.clientY);
  ({x,y} = adjustPlacement(x,y));                // 重なりすぎなら少しずらす
  const nx = (WALL_W-NOTE_W) ? x/(WALL_W-NOTE_W) : 0;
  const ny = (WALL_H-NOTE_H) ? y/(WALL_H-NOTE_H) : 0;
  await createPost(nx, ny);
});

document.addEventListener("keydown", e=>{
  if((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && (e.key==="z" || e.key==="Z")){
    const t = e.target;
    if(t && (t.tagName==="INPUT" || t.tagName==="TEXTAREA")) return; // 入力欄では文字のUNDOを優先
    e.preventDefault();
    doUndo();
  }
});

async function createPost(nx, ny){
  const RANDOM_NAMES = ["としあき","ﾄﾁｬｷ","としくん","「」","kakko","空白","jun","ぴるす","鍵最高","アージュ","雪の降る町","心理","ハデス","雨坊主","心太","ネギさま","こまち","jun君","自転車で来た","音ゲーの常連","DDRの常連"];
  let name = document.getElementById("who").value.trim().slice(0,16);
  if(!name) name = RANDOM_NAMES[Math.floor(Math.random()*RANDOM_NAMES.length)]; // 空欄ならランダム
  const angle = isMobileView() ? (Math.random()<0.5?-4:4) : rndAngle();  // モバイルは左右4°のみ
  const img = pendingImg;
  const meta = { name, t: Date.now(), sou:0, del:0, hidden:false, nx, ny, angle };  // 画像は含めない
  postBtn.disabled = true;
  try{

/* ---------- angle adjust ---------- */
let angleThrottle = 0;
// スライダー値 → 実回転角。±20は直立で傾け、それを超えると180度反転（反転側でも±20）
function vToRot(v){
  if(v > 20)  return 180 + (v - 20);    // 20〜40 → 180〜200（反転して＋方向に傾く）
  if(v < -20) return -180 + (v + 20);   // -40〜-20 → -180〜-200（反転して−方向に傾く）
  return v;                              // -20〜20 → 直立で傾く
}
function angleLabel(rot){
  if(rot >= -20 && rot <= 20) return rot + "°";
  const ft = rot > 0 ? rot - 180 : rot + 180; // 反転時の傾き -20〜20
  return "反転 " + (ft >= 0 ? "+" : "") + ft + "°";
}
function setNoteTransform(id, rot){
  const el = notesEl.querySelector('.note[data-id="'+id+'"]');
  if(el) el.style.transform = "rotate("+rot+"deg)";
}
let angleOpenedAt = 0;
function openAngleBar(angle){
  angleRange.value = angle;            // 初期角は±5なので直立帯＝スライダー値そのまま
  angleVal.textContent = angleLabel(angle);
  angleBar.classList.add("show");
  angleOpenedAt = Date.now();          // この直後の外側タップでは閉じない（配置タップの誤確定防止）
}
function applyAngle(write){
  if(!editingId) return;
  const rot = vToRot(+angleRange.value);
  angleVal.textContent = angleLabel(rot);
  const p = posts.get(editingId); if(p){ p.angle = rot; }
  setNoteTransform(editingId, rot);    // 全体再描画せず、その半紙だけ回す
  if(write && db){ update(ref(db, "posts/"+editingId), { angle:rot }).catch(()=>{}); }
}
function closeAngle(){
  if(!angleBar.classList.contains("show")) return;
  applyAngle(true);                    // 最終角を確定・保存
  angleBar.classList.remove("show");
  const el = editingId ? notesEl.querySelector('.note[data-id="'+editingId+'"]') : null;
  editingId = null;
  if(el) el.classList.remove("mine");
}
angleRange.addEventListener("input", ()=> applyAngle(false));   // ドラッグ中はローカルだけ更新（DB書き込み無し）
angleRange.addEventListener("change", ()=> applyAngle(true));   // 指を離したら保存
angleOk.addEventListener("click", closeAngle);
// バーの外をクリック／タップしても確定（ただし開いた直後の一瞬は無視＝配置タップで誤確定しない）
document.addEventListener("pointerdown", e=>{
  if(angleBar.classList.contains("show") && (Date.now()-angleOpenedAt > 400) && !angleBar.contains(e.target)) closeAngle();
});

/* ---------- PC: 弧型の回転スライダー（±20°）＋ 上下反転 ---------- */
const rotorEl = document.getElementById("rotor");
let rotorId = null, rotorR = 0, rotorOpenedAt = 0, rotorDragging = false;
let rotorTilt = 0, rotorFlipped = false;     // 傾き(±20)と反転(180°)を分けて保持
const ROTOR_MAX = 20;                        // 傾きの上限（左右20°）
function rotorCenter(){
  const p = posts.get(rotorId); if(!p) return null;
  const r = wallEl.getBoundingClientRect();  // 拡縮・スクロール済みの矩形
  return {
    cx: r.left + (clamp(nxOf(p,rotorId),0,1)*(WALL_W-NOTE_W) + NOTE_W/2)*zoom,
    cy: r.top  + (clamp(nyOf(p,rotorId),0,1)*(WALL_H-NOTE_H) + NOTE_H/2)*zoom
  };
}
function rotorPoint(angle, R, Rt){           // 傾き→ハンドル座標（真下=0、左で＋）
  const rad = angle*Math.PI/180;
  return { x:(R - Math.sin(rad)*Rt), y:(R + Math.cos(rad)*Rt) };
}
function buildRotor(){
  const R = NOTE_H*zoom*0.5 + 42; rotorR = R;
  const Rt = R - 12;
  let pts = [];
  for(let t=-ROTOR_MAX;t<=ROTOR_MAX;t+=1){ const q=rotorPoint(t,R,Rt); pts.push(q.x.toFixed(1)+","+q.y.toFixed(1)); }
  const h = rotorPoint(rotorTilt,R,Rt);
  rotorEl.style.width = rotorEl.style.height = (2*R)+"px";
  rotorEl.innerHTML =
    `<svg width="${2*R}" height="${2*R}" viewBox="0 0 ${2*R} ${2*R}">`+
    `<polyline points="${pts.join(' ')}" fill="none" stroke="rgba(181,52,31,.45)" stroke-width="3" stroke-linecap="round"/>`+
    `<line id="rotorStem" x1="${R}" y1="${R}" x2="${h.x.toFixed(1)}" y2="${h.y.toFixed(1)}" stroke="rgba(181,52,31,.35)" stroke-width="2"/>`+
    `<circle cx="${R}" cy="${R}" r="3" fill="rgba(181,52,31,.6)"/>`+
    `<circle id="rotorHandle" cx="${h.x.toFixed(1)}" cy="${h.y.toFixed(1)}" r="10" fill="#b5341f" stroke="#fff" stroke-width="2.5"/>`+
    `</svg>`+
    `<button class="rotor-flip${rotorFlipped?' active':''}" id="rotorFlip" title="上下反転">⇅ 反転</button>`;
}
function positionRotor(){
  const c = rotorCenter(); if(!c) return;
  rotorEl.style.left = (c.cx - rotorR) + "px";
  rotorEl.style.top  = (c.cy - rotorR) + "px";
}
function applyRotor(write){
  const eff = rotorTilt + (rotorFlipped ? 180 : 0);   // 実際の回転角
  const p = posts.get(rotorId); if(p) p.angle = eff;
  setNoteTransform(rotorId, eff);
  const el = rotorId ? notesEl.querySelector('.note[data-id="'+rotorId+'"]') : null;
  if(el) el.classList.toggle("flipped", rotorFlipped);  // テープ位置を反転に追従
  const h = rotorPoint(rotorTilt, rotorR, rotorR-12);
  const hd = rotorEl.querySelector("#rotorHandle"), st = rotorEl.querySelector("#rotorStem");
  if(hd){ hd.setAttribute("cx", h.x.toFixed(1)); hd.setAttribute("cy", h.y.toFixed(1)); }
  if(st){ st.setAttribute("x2", h.x.toFixed(1)); st.setAttribute("y2", h.y.toFixed(1)); }
  if(write && db) update(ref(db, "posts/"+rotorId), { angle:eff }).catch(()=>{});
}
function rotorSetTilt(tilt, write){
  rotorTilt = clamp(Math.round(tilt), -ROTOR_MAX, ROTOR_MAX);
  applyRotor(write);
}
function toggleFlip(){
  rotorFlipped = !rotorFlipped;
  const b = rotorEl.querySelector("#rotorFlip"); if(b) b.classList.toggle("active", rotorFlipped);
  applyRotor(true);
}
function angleFromPointer(e){
  const c = rotorCenter(); if(!c) return 0;
  const dx = e.clientX - c.cx, dy = e.clientY - c.cy;
  return Math.atan2(-dx, dy) * 180/Math.PI;   // 真下=0、左へ回すと＋
}
function openRotor(id, angle){
  rotorId = id;
  let a = ((angle%360)+360)%360;               // 0..360
  rotorFlipped = (a>90 && a<270);
  let tilt = rotorFlipped ? a-180 : (a>180 ? a-360 : a);
  rotorTilt = clamp(Math.round(tilt), -ROTOR_MAX, ROTOR_MAX);
  buildRotor();
  positionRotor();
  rotorEl.classList.add("show");
  rotorOpenedAt = Date.now();
}
function closeRotor(){
  if(!rotorEl.classList.contains("show")) return;
  applyRotor(true);                            // 最終状態を保存
  rotorEl.classList.remove("show");
  const el = rotorId ? notesEl.querySelector('.note[data-id="'+rotorId+'"]') : null;
  if(el) el.classList.remove("mine");
  rotorId = null; editingId = null; rotorDragging = false;
}
rotorEl.addEventListener("pointerdown", e=>{
  if(e.target.closest("#rotorFlip")){ e.preventDefault(); e.stopPropagation(); toggleFlip(); return; }  // 反転ボタン
  e.preventDefault(); rotorDragging = true; rotorSetTilt(angleFromPointer(e), false);
});
window.addEventListener("pointermove", e=>{ if(rotorDragging) rotorSetTilt(angleFromPointer(e), false); });
window.addEventListener("pointerup", ()=>{ if(rotorDragging){ rotorDragging = false; rotorSetTilt(rotorTilt, true); } });
// 外側をクリックで確定（開いた直後の一瞬は無視）
document.addEventListener("pointerdown", e=>{
  if(rotorEl.classList.contains("show") && (Date.now()-rotorOpenedAt > 400) && !rotorEl.contains(e.target)) closeRotor();
});
scrollEl.addEventListener("scroll", ()=>{ if(rotorEl.classList.contains("show")) positionRotor(); }, {passive:true});

/* ---------- voting (transaction) ---------- */
async function vote(type, id){
  if(!db) return;
  if(id !== activeNoteId){      // 最前面に出ていない半紙は、まず前に出すだけ（誤操作防止）
    raiseNote(id); setActive(id);
    return;
  }
  if(type==="sou"){
    if(souDone.has(id)){ toast("もう押したよ"); return; }
    souDone.add(id);
    try{ await runTransaction(ref(db, "posts/"+id+"/sou"), v => (v||0)+1); toast("そうだね！"); }
    catch(e){ souDone.delete(id); toast("失敗しました"); }
  } else {
    if(delDone.has(id)){ toast("通報済み"); return; }
    if(!confirm("この投稿を削除依頼（del）しますか？")) return;
    delDone.add(id);
    try{
      let hiddenNow = false;
      await runTransaction(ref(db, "posts/"+id), p => {
        if(!p) return p;
        p.del = (p.del||0)+1;
        if(p.del >= DEL_THRESHOLD){ p.hidden = true; hiddenNow = true; }
        return p;
      });
      toast(hiddenNow ? "非表示にしました" : "delしました");
    }catch(e){ delDone.delete(id); toast("失敗しました"); }
  }
}

/* ---------- zoom & scroll ---------- */
function applyZoom(){
  wallEl.style.transform = "scale("+zoom+")";
  sizerEl.style.width  = (WALL_W*zoom)+"px";
  sizerEl.style.height = (WALL_H*zoom)+"px";
  const zr = document.getElementById("zoomRange");
  const zv = document.getElementById("zoomVal");
  if(zr) zr.value = zoom;
  if(zv) zv.textContent = Math.round(zoom*100)+"%";
  if(typeof drawMinimap === "function") drawMinimap();
  scheduleLazy();
}
function computeZoomMin(){
  const fitH = scrollEl.clientHeight / WALL_H;
  zoomMin = Math.max(0.05, Math.floor(fitH*100)/100);
  const zr = document.getElementById("zoomRange");
  if(zr){ zr.min = zoomMin; zr.step = 0.01; }
  if(zoom < zoomMin){ zoomTo(zoomMin); }
}
// anchorClientX/Y を指定すると、その画面位置の指す壁の点を固定したままズーム
function zoomTo(z, anchorClientX, anchorClientY){
  z = clamp(Math.round(z*100)/100, zoomMin, ZOOM_MAX);
  if(z === zoom){ applyZoom(); return; }
  const r = scrollEl.getBoundingClientRect();
  const ax = (anchorClientX==null) ? scrollEl.clientWidth/2  : (anchorClientX - r.left);
  const ay = (anchorClientY==null) ? scrollEl.clientHeight/2 : (anchorClientY - r.top);
  const natX = (scrollEl.scrollLeft + ax) / zoom;
  const natY = (scrollEl.scrollTop  + ay) / zoom;
  zoom = z;
  applyZoom();
  scrollEl.scrollLeft = clamp(natX*zoom - ax, 0, Math.max(0, WALL_W*zoom - scrollEl.clientWidth));
  scrollEl.scrollTop  = clamp(natY*zoom - ay, 0, Math.max(0, WALL_H*zoom - scrollEl.clientHeight));
}
document.getElementById("zoomRange").addEventListener("input", e=> zoomTo(+e.target.value));
document.getElementById("zoomIn").addEventListener("click", ()=> zoomTo(zoom+0.1));
document.getElementById("zoomOut").addEventListener("click", ()=> zoomTo(zoom-0.1));
window.addEventListener("resize", ()=>{ computeZoomMin(); drawMinimap(); });

// ホイールで拡大率調整（カーソル位置を中心に。全体が見えるところまで縮小可）
scrollEl.addEventListener("wheel", e=>{
  e.preventDefault();
  zoomTo(zoom + (e.deltaY<0 ? 0.1 : -0.1), e.clientX, e.clientY);
}, {passive:false});

// 2本指ピンチで拡大縮小（スマホ用。1本指は通常スクロール）
let pinchActive=false, pinchStartDist=0, pinchStartZoom=1;
function touchDist(a,b){ return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
scrollEl.addEventListener("touchstart", e=>{
  if(e.touches.length===2){
    pinchActive=true;
    pinchStartDist=touchDist(e.touches[0],e.touches[1]) || 1;
    pinchStartZoom=zoom;
    e.preventDefault();
  }
}, {passive:false});
scrollEl.addEventListener("touchmove", e=>{
  if(pinchActive && e.touches.length===2){
    e.preventDefault();
    const d = touchDist(e.touches[0],e.touches[1]);
    const mx = (e.touches[0].clientX+e.touches[1].clientX)/2;
    const my = (e.touches[0].clientY+e.touches[1].clientY)/2;
    zoomTo(pinchStartZoom * (d/pinchStartDist), mx, my);
  }
}, {passive:false});
scrollEl.addEventListener("touchend", e=>{ if(e.touches.length<2) pinchActive=false; });
scrollEl.addEventListener("touchcancel", ()=>{ pinchActive=false; });

// 左ドラッグでボード内を動かす（マウスのみ。タッチは標準スクロール）
let panning=false, panMoved=false, panSX=0, panSY=0, panSL=0, panST=0, suppressClick=false;
scrollEl.addEventListener("pointerdown", e=>{
  if(e.button!==0 || e.pointerType!=="mouse") return;
  panning=true; panMoved=false;
  panSX=e.clientX; panSY=e.clientY;
  panSL=scrollEl.scrollLeft; panST=scrollEl.scrollTop;
});
window.addEventListener("pointermove", e=>{
  if(!panning) return;
  const dx=e.clientX-panSX, dy=e.clientY-panSY;
  if(!panMoved && (Math.abs(dx)+Math.abs(dy))>5){ panMoved=true; scrollEl.classList.add("grabbing"); }
  if(panMoved){ scrollEl.scrollLeft = panSL-dx; scrollEl.scrollTop = panST-dy; }
});
window.addEventListener("pointerup", ()=>{
  if(panning && panMoved) suppressClick=true; // ドラッグ後のクリックは無効化
  panning=false; scrollEl.classList.remove("grabbing");
});
scrollEl.addEventListener("click", e=>{
  if(suppressClick){ e.stopPropagation(); e.preventDefault(); suppressClick=false; }
}, true);

function randomStartScroll(){
  const vw = scrollEl.clientWidth, vh = scrollEl.clientHeight;
  const maxX = Math.max(0, WALL_W*zoom - vw);
  const maxY = Math.max(0, WALL_H*zoom - vh);
  scrollEl.scrollLeft = Math.random()*maxX;
  scrollEl.scrollTop  = Math.random()*maxY;
}

/* ---------- minimap ---------- */
const miniCanvas = document.getElementById("miniCanvas");
function drawMinimap(){
  if(!miniCanvas) return;
  const mmW = miniCanvas.clientWidth, mmH = miniCanvas.clientHeight;
  if(!mmW || !mmH) return;
  if(miniCanvas.width !== Math.round(mmW*DPR)){ miniCanvas.width = Math.round(mmW*DPR); miniCanvas.height = Math.round(mmH*DPR); }
  const g = miniCanvas.getContext("2d");
  g.setTransform(DPR,0,0,DPR,0,0);
  g.clearRect(0,0,mmW,mmH);
  const sx = mmW/WALL_W, sy = mmH/WALL_H;
  for(const [id,p] of posts){
    if(p.hidden && !admin) continue;
    const x = clamp(nxOf(p,id),0,1)*(WALL_W-NOTE_W)*sx;
    const y = clamp(nyOf(p,id),0,1)*(WALL_H-NOTE_H)*sy;
    g.fillStyle = p.hidden ? "rgba(181,52,31,.55)" : "#3a332b";
    g.fillRect(x, y, Math.max(2, NOTE_W*sx), Math.max(2, NOTE_H*sy*0.85));
  }
  const vx = (scrollEl.scrollLeft/(WALL_W*zoom))*mmW;
  const vy = (scrollEl.scrollTop /(WALL_H*zoom))*mmH;
  const vw = Math.min(mmW, (scrollEl.clientWidth /(WALL_W*zoom))*mmW);
  const vh = Math.min(mmH, (scrollEl.clientHeight/(WALL_H*zoom))*mmH);
  g.strokeStyle = "#b5341f"; g.lineWidth = 1.5;
  g.strokeRect(vx+0.5, vy+0.5, Math.max(3,vw-1), Math.max(3,vh-1));
}
function miniJump(clientX, clientY){
  const r = miniCanvas.getBoundingClientRect();
  const fx = clamp((clientX-r.left)/r.width, 0, 1);
  const fy = clamp((clientY-r.top )/r.height,0, 1);
  scrollEl.scrollLeft = clamp(fx*WALL_W*zoom - scrollEl.clientWidth/2,  0, Math.max(0, WALL_W*zoom - scrollEl.clientWidth));
  scrollEl.scrollTop  = clamp(fy*WALL_H*zoom - scrollEl.clientHeight/2, 0, Math.max(0, WALL_H*zoom - scrollEl.clientHeight));
}
let miniDown=false;
miniCanvas.addEventListener("pointerdown", e=>{ miniDown=true; miniJump(e.clientX,e.clientY); e.preventDefault(); });
miniCanvas.addEventListener("pointermove", e=>{ if(miniDown){ miniJump(e.clientX,e.clientY); e.preventDefault(); } });
window.addEventListener("pointerup", ()=>{ miniDown=false; });

let mmRaf=0;
scrollEl.addEventListener("scroll", ()=>{ if(!mmRaf) mmRaf=requestAnimationFrame(()=>{ mmRaf=0; drawMinimap(); }); scheduleLazy(); });

/* ---------- 半紙めぐり ---------- */
let meguriIdx = -1;
function visibleByRecency(){
  return [...posts.entries()].filter(([id,p])=> admin || !p.hidden)
    .sort((a,b)=> (b[1].t||0)-(a[1].t||0));
}
// 「半紙にかく」パネルに隠れない着地点（ビューポート内の座標）を返す
function focusAnchor(){
  const vw = scrollEl.clientWidth, vh = scrollEl.clientHeight;
  let ax = vw/2, ay = vh/2;
  const half = (NOTE_H*zoom)/2 + 10;   // 半紙の高さ半分ぶんの余白
  if(floatDesk && !floatDesk.classList.contains("collapsed")){
    const d = floatDesk.getBoundingClientRect(), sc = scrollEl.getBoundingClientRect();
    const dLeft = d.left - sc.left, dRight = d.right - sc.left, dBottom = d.bottom - sc.top;
    if(dLeft <= ax && dRight >= ax){            // 机が画面中央の列を覆っている
      const avail = vh - dBottom;
      if(avail >= NOTE_H*zoom + 60){            // 机の下に半紙が収まる→その中央へ
        ay = dBottom + avail/2;
      } else {                                   // 下が狭い→机の右側に寄せる
        ax = Math.min(vw - half, (dRight + vw)/2);
      }
    }
  }
  return {ax, ay};
}
function centerOnNote(id, p, targetZoom){
  const target = (targetZoom != null) ? targetZoom : ((window.innerWidth <= 560) ? 1.0 : 1.3);  // 既定: PC130%/モバイル100%
  const z = clamp(target, zoomMin, ZOOM_MAX);
  if(z !== zoom){ zoom = z; applyZoom(); }
  const px = (clamp(nxOf(p,id),0,1)*(WALL_W-NOTE_W) + NOTE_W/2) * zoom;
  const py = (clamp(nyOf(p,id),0,1)*(WALL_H-NOTE_H) + NOTE_H/2) * zoom;
  const {ax, ay} = focusAnchor();
  scrollEl.scrollLeft = clamp(px - ax, 0, Math.max(0, WALL_W*zoom - scrollEl.clientWidth));
  scrollEl.scrollTop  = clamp(py - ay, 0, Math.max(0, WALL_H*zoom - scrollEl.clientHeight));
  drawMinimap();
  raiseNote(id);   // フォーカス対象を最前面に（下になっていても見えるように）
  requestAnimationFrame(()=>{
    notesEl.querySelectorAll('.note.found').forEach(n=> n.classList.remove("found"));  // 他の半紙の赤枠は消す
    const el = notesEl.querySelector('.note[data-id="'+id+'"]');
    if(el){ void el.offsetWidth; el.classList.add("found"); }
  });
}
function gotoNote(step){
  const list = visibleByRecency();
  if(!list.length){ toast("まだ半紙がないよ"); return; }
  meguriIdx = ((meguriIdx + step) % list.length + list.length) % list.length;
  const [id,p] = list[meguriIdx];
  centerOnNote(id, p);
}
document.getElementById("prevNote").addEventListener("click", ()=> gotoNote(-1));
document.getElementById("nextNote").addEventListener("click", ()=> gotoNote(1));

/* ---------- 起動時：貼られた半紙のどれかにランダムでフォーカス ---------- */
let didInitialFocus = false;
let focusTimer = null;
// 指定ズームで寄せたとき、その半紙の中心が画面の安全な縦範囲に収まるか
function focusReachable(id, p, z){
  const vh = scrollEl.clientHeight;
  const {ay} = focusAnchor();
  const py = (clamp(nyOf(p,id),0,1)*(WALL_H-NOTE_H) + NOTE_H/2) * z;
  const st = clamp(py - ay, 0, Math.max(0, WALL_H*z - vh));
  const sy = py - st;                       // 画面上のY
  const topSafe = 60;                        // ヘッダーぶん
  const bottomSafe = vh - 150;               // 半紙めぐり／マップぶん
  return sy >= topSafe && sy <= bottomSafe;
}
function initialFocus(){
  if(didInitialFocus) return;
  const full = visibleByRecency();
  if(!full.length) return;       // まだ無ければ何もしない（次の追加で再トライ）
  didInitialFocus = true;
  const focusZoom = clamp(1.0 + Math.random()*(ZOOM_MAX-1.0), 1.0, ZOOM_MAX);  // 100%以上でランダム
  let list = full;
  if(window.innerWidth <= 560){  // モバイル: 下部UIに隠れる位置にしか置けない半紙は候補から外す
    const ok = full.filter(([id,p])=> focusReachable(id, p, focusZoom));
    if(ok.length) list = ok;     // 候補があれば絞り込み、無ければ全体から選ぶ
  }
  const [id,p] = list[Math.floor(Math.random()*list.length)];
  meguriIdx = full.findIndex(e=> e[0]===id);   // めぐりの番号は全体基準で合わせる
  centerOnNote(id, p, focusZoom);   // 開いたときは100%以上のランダム倍率でフォーカス
}

/* 初回ガイド：画面中央で点滅 → 左上の「半紙を広げる」バーへスッと移動 → 短く点滅して消える */
function runGuide(){
  const guide = document.getElementById("guide");
  if(!guide || !floatDesk.classList.contains("collapsed")){ floatDesk.classList.remove("guiding"); return; }
  floatDesk.classList.add("guiding");        // 中央表示中は左上の実バーを隠す
  guide.style.left = (window.innerWidth/2) + "px";
  guide.style.top  = (window.innerHeight/2) + "px";
  guide.style.transform = "translate(-50%,-50%)";
  guide.classList.add("show");
  let done = false;
  const reveal = ()=> floatDesk.classList.remove("guiding");   // 実バーを出す
  const finish = ()=>{ if(done) return; done = true; reveal(); guide.classList.remove("show"); setTimeout(()=>guide.remove(), 450); };
  guide.addEventListener("click", ()=>{ setDeskCollapsed(false); finish(); });
  const CENTER_DWELL = 1500, MOVE = 800, LINGER = 600;
  setTimeout(()=>{                            // 左上へ移動
    if(done) return;
    const r = floatDesk.getBoundingClientRect();
    guide.style.left = r.left + "px";
    guide.style.top  = r.top + "px";
    guide.style.transform = "translate(0,0)";
  }, CENTER_DWELL);
  setTimeout(reveal, CENTER_DWELL + MOVE);     // 到着で実バーをフェードイン
  setTimeout(finish, CENTER_DWELL + MOVE + LINGER);
}
